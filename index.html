<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="next6 — An IT Company">
    <meta name="theme-color" content="#050508">
    <title>next6</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #050508;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* ===== ANIMATED BACKGROUND GRID ===== */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: radial-gradient(circle, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            animation: gridDrift 20s linear infinite;
            pointer-events: none;
            will-change: transform;
            z-index: 0;
        }

        @keyframes gridDrift {
            0%   { transform: translate(0, 0); }
            100% { transform: translate(40px, 40px); }
        }

        /* ===== AURORA GLOW BACKGROUND ===== */
        .aurora {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
            contain: layout style paint;
        }

        .aurora .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.35;
            animation: auroraMove 8s ease-in-out infinite alternate;
            will-change: transform, opacity;
        }

        .aurora .blob:nth-child(1) {
            width: 600px;
            height: 600px;
            background: #00d4ff;
            top: 30%;
            left: 35%;
            animation-duration: 8s;
        }

        .aurora .blob:nth-child(2) {
            width: 500px;
            height: 500px;
            background: #2d6aff;
            top: 25%;
            left: 50%;
            animation-duration: 10s;
            animation-delay: -3s;
        }

        .aurora .blob:nth-child(3) {
            width: 400px;
            height: 400px;
            background: #6B21F7;
            top: 40%;
            left: 40%;
            animation-duration: 12s;
            animation-delay: -6s;
            opacity: 0.25;
        }

        @keyframes auroraMove {
            0%   { transform: translate(0, 0) scale(1);      opacity: 0.25; }
            33%  { transform: translate(60px, -40px) scale(1.15); opacity: 0.4; }
            66%  { transform: translate(-40px, 30px) scale(0.9);  opacity: 0.3; }
            100% { transform: translate(20px, -20px) scale(1.05); opacity: 0.35; }
        }

        /* ===== DARK OVERLAY FOR DEPTH ===== */
        .overlay {
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at center, transparent 0%, #050508 75%);
            z-index: 1;
            pointer-events: none;
        }

        /* ===== MAIN CONTENT ===== */
        .content {
            position: relative;
            z-index: 10;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
        }

        /* ===== LOGO ===== */
        .logo {
            font-size: clamp(5rem, 12vw, 14rem);
            font-weight: 900;
            letter-spacing: -0.04em;
            line-height: 1;
            background: linear-gradient(135deg, #00d4ff 0%, #2d6aff 50%, #6B21F7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            position: relative;
            animation: logoReveal 1.8s cubic-bezier(0.16, 1, 0.3, 1) both;
            cursor: default;
            user-select: none;
        }

        .logo::after {
            content: 'next6';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, #00d4ff 0%, #2d6aff 50%, #6B21F7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: blur(40px);
            opacity: 0.6;
            animation: glowPulse 4s ease-in-out infinite;
            pointer-events: none;
            will-change: opacity, transform;
        }

        @keyframes logoReveal {
            0%   { opacity: 0; transform: scale(0.7); filter: blur(20px); }
            60%  { opacity: 1; filter: blur(0px); }
            80%  { transform: scale(1.02); }
            100% { opacity: 1; transform: scale(1); filter: blur(0px); }
        }

        @keyframes glowPulse {
            0%, 100% { opacity: 0.4; transform: scale(1); }
            50%      { opacity: 0.7; transform: scale(1.05); }
        }

        /* ===== TAGLINE ===== */
        .tagline {
            font-size: clamp(0.85rem, 1.8vw, 1.2rem);
            font-weight: 300;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.35);
            animation: tagReveal 1.5s ease 1.2s both;
        }

        @keyframes tagReveal {
            0%   { opacity: 0; transform: translateY(16px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* ===== FLOATING PARTICLES ===== */
        .particles {
            position: fixed;
            inset: 0;
            z-index: 2;
            pointer-events: none;
            overflow: hidden;
            contain: layout style paint;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            border-radius: 50%;
            background: rgba(0, 212, 255, 0.5);
            animation: particleFloat linear infinite;
            will-change: transform, opacity;
        }

        .particle:nth-child(1)  { left: 10%; animation-duration: 18s; animation-delay: 0s;   top: 100%; }
        .particle:nth-child(2)  { left: 20%; animation-duration: 22s; animation-delay: -4s;  top: 100%; background: rgba(45, 106, 255, 0.5); width: 3px; height: 3px; }
        .particle:nth-child(3)  { left: 35%; animation-duration: 16s; animation-delay: -2s;  top: 100%; }
        .particle:nth-child(4)  { left: 50%; animation-duration: 20s; animation-delay: -8s;  top: 100%; background: rgba(107, 33, 247, 0.45); }
        .particle:nth-child(5)  { left: 65%; animation-duration: 24s; animation-delay: -5s;  top: 100%; width: 3px; height: 3px; }
        .particle:nth-child(6)  { left: 75%; animation-duration: 17s; animation-delay: -10s; top: 100%; background: rgba(45, 106, 255, 0.4); }
        .particle:nth-child(7)  { left: 85%; animation-duration: 21s; animation-delay: -3s;  top: 100%; }
        .particle:nth-child(8)  { left: 5%;  animation-duration: 19s; animation-delay: -7s;  top: 100%; background: rgba(107, 33, 247, 0.35); width: 3px; height: 3px; }
        .particle:nth-child(9)  { left: 45%; animation-duration: 23s; animation-delay: -12s; top: 100%; }
        .particle:nth-child(10) { left: 90%; animation-duration: 15s; animation-delay: -1s;  top: 100%; background: rgba(0, 212, 255, 0.6); }
        .particle:nth-child(11) { left: 28%; animation-duration: 26s; animation-delay: -9s;  top: 100%; }
        .particle:nth-child(12) { left: 58%; animation-duration: 20s; animation-delay: -15s; top: 100%; background: rgba(45, 106, 255, 0.35); }

        @keyframes particleFloat {
            0%   { transform: translateY(0) translateX(0); opacity: 0; }
            10%  { opacity: 1; }
            90%  { opacity: 1; }
            100% { transform: translateY(-100vh) translateX(30px); opacity: 0; }
        }

        /* ===== AMBIENT GLOW ===== */
        body::after {
            content: '';
            position: fixed;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0,212,255,0.06) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 3;
            animation: ambientGlow 6s ease-in-out infinite;
            will-change: opacity, transform;
        }

        @keyframes ambientGlow {
            0%, 100% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }
            50%      { opacity: 1;   transform: translate(-50%, -50%) scale(1.3); }
        }
    </style>
</head>
<body>
    <!-- AURORA GLOW -->
    <div class="aurora">
        <div class="blob"></div>
        <div class="blob"></div>
        <div class="blob"></div>
    </div>

    <!-- DARK OVERLAY -->
    <div class="overlay"></div>

    <!-- FLOATING PARTICLES -->
    <div class="particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="content">
        <div class="logo">next6</div>
        <div class="tagline">An IT Company</div>
    </div>
</body>
</html>
